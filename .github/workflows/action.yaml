name: Build and Deploy
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on: push
jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'
      - name: Install web dependencies
        run: cd web && npm install
      - name: Create Python Virtual Environment
        run: python -m venv .venv
      - name: Install Python package
        run: source .venv/bin/activate && pip install -e python/
      - name: Pol echo
        run: source .venv/bin/activate && pol echo
      - uses: actions/cache/save@v4
        id: cache
        with:
          path: .venv/
          key: ${{ runner.os }}-${{ hashFiles('python/setup.py') }}

  build:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .venv/
          key: ${{ runner.os }}-${{ hashFiles('python/setup.py') }}
      - name: echo2
        run: source .venv/bin/activate && which pip && which pol
      - name: echo
        run: source .venv/bin/activate && pol echo
      - name: Build JSON data
        run: pol build --target=json
      - name: Build Web Application
        run: pol build --target=web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: cd web && vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
